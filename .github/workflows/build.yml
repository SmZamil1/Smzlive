name: Build APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download source zip from GitHub
        run: |
          curl -L \
            "https://github.com/SmZamil1/Smzlive/raw/main/smizo_v25_source.zip" \
            -o source.zip
          echo "Zip size: $(ls -lh source.zip)"

      - name: Extract zip
        run: |
          unzip -o source.zip
          INNER=$(unzip -Z1 source.zip | head -1 | cut -d/ -f1)
          if [ -d "$INNER" ] && [ "$INNER" != "app" ]; then
            echo "Moving $INNER/* to root"
            shopt -s dotglob
            mv "$INNER"/* . 2>/dev/null || true
            rm -rf "$INNER"
          fi
          echo "=== Root ===" && ls -la
          echo "=== app/ ===" && ls app/ 2>/dev/null || echo "no app dir"

      - name: Write Gradle wrapper
        run: |
          mkdir -p gradle/wrapper

          cat > settings.gradle << 'EOF'
pluginManagement {
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories { google(); mavenCentral() }
}
rootProject.name = "Smizo"
include ':app'
EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

          cat > gradlew << 'EOF'
#!/bin/sh
exec java ${JAVA_OPTS:-} \
  -classpath "$(dirname $0)/gradle/wrapper/gradle-wrapper.jar" \
  org.gradle.wrapper.GradleWrapperMain "$@"
EOF
          chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/smizo.jks

      - name: Build Release APK
        env:
          SMIZO_KEYSTORE_PATH: /tmp/smizo.jks
          SMIZO_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SMIZO_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          SMIZO_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smizo-v25-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 60
