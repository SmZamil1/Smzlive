name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download zip directly from repo
        run: |
          curl -L \
            "https://raw.githubusercontent.com/SmZamil1/Smzlive/main/smizo_v25_source.zip" \
            -o source.zip
          ls -lh source.zip
          file source.zip

      - name: Extract zip to workspace
        run: |
          unzip -o source.zip -d extracted/
          echo "=== Extracted top-level ==="
          ls -la extracted/
          # Move inner folder contents up if needed
          INNER=$(ls extracted/ | head -1)
          echo "Inner folder: $INNER"
          if [ -d "extracted/$INNER" ]; then
            cp -r extracted/$INNER/. .
          else
            cp -r extracted/. .
          fi
          echo "=== Workspace root ==="
          ls -la
          echo "=== app/ ==="
          ls -la app/ || echo "ERROR: no app/ folder"
          echo "=== app/src/main ==="
          ls app/src/main/ || true

      - name: Write Gradle wrapper files
        run: |
          mkdir -p gradle/wrapper

          # Only write if missing
          [ -f settings.gradle ] || cat > settings.gradle << 'EOF'
pluginManagement {
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories { google(); mavenCentral() }
}
rootProject.name = "Smizo"
include ':app'
EOF

          [ -f gradle.properties ] || cat > gradle.properties << 'EOF'
android.useAndroidX=true
android.enableJetifier=false
org.gradle.jvmargs=-Xmx2048m
EOF

          [ -f build.gradle ] || cat > build.gradle << 'EOF'
plugins {
    id 'com.android.application' version '8.2.2' apply false
}
EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

          # Download wrapper jar
          curl -sL \
            "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/

          # Write gradlew
          cat > gradlew << 'GRADLEW'
#!/bin/sh
SCRIPT=$(readlink -f "$0")
APP_HOME=$(dirname "$SCRIPT")
exec java ${JAVA_OPTS:-} \
  -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" \
  org.gradle.wrapper.GradleWrapperMain "$@"
GRADLEW
          chmod +x gradlew
          echo "Gradle setup complete"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/smizo.jks
          ls -lh /tmp/smizo.jks

      - name: Build Release APK
        env:
          SMIZO_KEYSTORE_PATH: /tmp/smizo.jks
          SMIZO_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SMIZO_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          SMIZO_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smizo-v25-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 60
