name: Build Smizo APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ──────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Locate project root (zip or direct) ──────────────────────────
      - name: Locate project root
        id: locate
        run: |
          # Support both: repo IS the project, or project is inside a zip
          if [ -f "gradlew" ]; then
            echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_OUTPUT
          else
            ZIP=$(find . -maxdepth 3 -name "*.zip" | head -1)
            if [ -n "$ZIP" ]; then
              mkdir -p extracted
              unzip -q "$ZIP" -d extracted/
              ROOT=$(find extracted/ -name "gradlew" | head -1 | xargs dirname)
              echo "PROJECT_DIR=$ROOT" >> $GITHUB_OUTPUT
            else
              echo "ERROR: No gradlew or zip found" && exit 1
            fi
          fi

      - name: Make gradlew executable
        run: chmod +x "${{ steps.locate.outputs.PROJECT_DIR }}/gradlew"

      # ── 5. Gradle cache ─────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. Decode keystore (optional – for signed release) ───────────────
      # To enable signing, add these GitHub Secrets:
      #   SMIZO_KEYSTORE_B64   → base64 of your .jks file
      #   SMIZO_KEYSTORE_PASSWORD, SMIZO_KEY_ALIAS, SMIZO_KEY_PASSWORD
      - name: Decode keystore
        if: ${{ secrets.SMIZO_KEYSTORE_B64 != '' }}
        run: |
          echo "${{ secrets.SMIZO_KEYSTORE_B64 }}" | base64 -d > /tmp/smizo.jks
          echo "SMIZO_KEYSTORE_PATH=/tmp/smizo.jks"       >> $GITHUB_ENV
          echo "SMIZO_KEYSTORE_PASSWORD=${{ secrets.SMIZO_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "SMIZO_KEY_ALIAS=${{ secrets.SMIZO_KEY_ALIAS }}"                 >> $GITHUB_ENV
          echo "SMIZO_KEY_PASSWORD=${{ secrets.SMIZO_KEY_PASSWORD }}"           >> $GITHUB_ENV

      # ── 7. Build ─────────────────────────────────────────────────────────
      - name: Build Debug APK (always)
        run: |
          cd "${{ steps.locate.outputs.PROJECT_DIR }}"
          ./gradlew assembleDebug --stacktrace 2>&1

      - name: Build Release APK (when keystore available)
        if: ${{ secrets.SMIZO_KEYSTORE_B64 != '' }}
        run: |
          cd "${{ steps.locate.outputs.PROJECT_DIR }}"
          ./gradlew assembleRelease --stacktrace 2>&1

      # ── 8. Upload artifacts ──────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Smizo-debug-APK
          path: "**/build/outputs/apk/debug/**.apk"
          retention-days: 30

      - name: Upload Release APK
        if: ${{ secrets.SMIZO_KEYSTORE_B64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Smizo-release-signed-APK
          path: "**/build/outputs/apk/release/**.apk"
          retention-days: 30

      - name: Summary
        run: |
          echo "✅ Smizo APK build complete"
          echo "📦 App ID: com.smizo.app"
          echo "🌐 API: https://smizo.page.gd/php/api.php"
