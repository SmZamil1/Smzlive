name: Build Smizo Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Decode Keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/smizo_keystore.jks
          echo "Keystore decoded: $(ls -lh /tmp/smizo_keystore.jks)"

      - name: Build Release APK
        env:
          SMIZO_KEYSTORE_PATH: /tmp/smizo_keystore.jks
          SMIZO_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SMIZO_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          SMIZO_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/Smizo-v25-release.apk
          echo "APK size: $(ls -lh out/Smizo-v25-release.apk)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smizo-v25-release-apk
          path: out/Smizo-v25-release.apk
          retention-days: 60

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v25.0
          name: "Smizo v25.0 — Ultimate Live TV"
          body: |
            ## Smizo v25.0
            - ⚡ Faster stream loading (low-network optimised)
            - 📺 Telegram-style navigation
            - ⚽ FIFA World Cup 2026 tab
            - 🚫 PiP removed completely
            - 📦 App size 5.8MB+
            - 🔄 Auto retry + server switching
          files: out/Smizo-v25-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
