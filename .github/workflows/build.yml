name: Build Smizo APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate project root (supports a zipped project or raw files)
        run: |
          if [ -f "build.gradle" ] || [ -f "settings.gradle" ]; then
            echo "Project files already at repo root."
            echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          else
            ZIP=$(find . -maxdepth 3 -iname "*.zip" | head -1)
            if [ -z "$ZIP" ]; then
              echo "No build.gradle at root and no zip found — nothing to build."
              exit 1
            fi
            echo "Found zip: $ZIP"
            mkdir -p extracted
            unzip -q "$ZIP" -d extracted/
            ROOT=$(find extracted/ -maxdepth 3 -name "build.gradle" ! -path "*/app/*" | head -1 | xargs dirname)
            echo "Project root: $ROOT"
            echo "PROJECT_DIR=$GITHUB_WORKSPACE/$ROOT" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Decode the release keystore from a GitHub Secret ──
      # Required secrets (Settings → Secrets and variables → Actions):
      #   SMIZO_KEYSTORE_BASE64   - your .jks/.keystore file, base64-encoded
      #   SMIZO_KEYSTORE_PASSWORD - keystore password
      #   SMIZO_KEY_ALIAS         - key alias inside the keystore
      #   SMIZO_KEY_PASSWORD      - key password (often same as keystore password)
      #
      # Don't have a keystore yet? Generate one locally with:
      #   keytool -genkeypair -v -keystore smizo-release.jks -alias smizo \
      #     -keyalg RSA -keysize 2048 -validity 10000
      # Then base64-encode it for the secret:
      #   base64 -w0 smizo-release.jks > smizo-release.b64.txt
      - name: Decode keystore
        env:
          SMIZO_KEYSTORE_BASE64: ${{ secrets.SMIZO_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SMIZO_KEYSTORE_BASE64" ]; then
            echo "$SMIZO_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/smizo-release.jks"
          else
            echo "⚠️  No SMIZO_KEYSTORE_BASE64 secret set."
            echo "    assembleRelease will fail without a signing config."
            echo "    See the comment above this step for keystore setup."
          fi

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Smizo-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        if: ${{ secrets.SMIZO_KEYSTORE_BASE64 != '' }}
        env:
          SMIZO_KEYSTORE_PATH: ${{ github.workspace }}/smizo-release.jks
          SMIZO_KEYSTORE_PASSWORD: ${{ secrets.SMIZO_KEYSTORE_PASSWORD }}
          SMIZO_KEY_ALIAS: ${{ secrets.SMIZO_KEY_ALIAS }}
          SMIZO_KEY_PASSWORD: ${{ secrets.SMIZO_KEY_PASSWORD }}
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        if: ${{ secrets.SMIZO_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Smizo-release-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build success
        run: echo "✅ Smizo APK build finished!"
