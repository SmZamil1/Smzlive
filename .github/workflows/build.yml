name: Build SMZ Live APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find and extract project zip
        run: |
          ZIP=$(find . -maxdepth 3 -name "*.zip" | head -1)
          echo "Found zip: $ZIP"
          mkdir -p extracted
          unzip -q "$ZIP" -d extracted/
          echo "Extracted contents:"
          ls extracted/
          # Find root build.gradle (not in app/)
          ROOT=$(find extracted/ -name "build.gradle" ! -path "*/app/*" | head -1 | xargs dirname)
          echo "Project root: $ROOT"
          mkdir -p $GITHUB_WORKSPACE/project
          cp -r "$ROOT/." $GITHUB_WORKSPACE/project/
          echo "Project files:"
          ls $GITHUB_WORKSPACE/project/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x $GITHUB_WORKSPACE/project/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          cd $GITHUB_WORKSPACE/project
          ./gradlew assembleDebug --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SMZLive-v19.08-APK
          path: ${{ github.workspace }}/project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build success
        run: echo "✅ SMZ Live v19.08 APK built successfully!"
