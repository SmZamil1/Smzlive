name: Generate Keystore (run once)
on: workflow_dispatch
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v -keystore smizo-release.jks -alias smizo \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "ChangeMe123!" -keypass "ChangeMe123!" \
            -dname "CN=Smizo, OU=Smizo, O=Smizo, L=City, ST=State, C=US"
          base64 -w0 smizo-release.jks > smizo-release.b64.txt
      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: smizo-keystore
          path: |
            smizo-release.jks
            smizo-release.b64.txt
